<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Add favicon to prevent 404 error -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <!-- Load Supabase - errors are caught and ignored -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Your original styles */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .container {
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 300px;
            width: 90%;
            position: relative;
        }

        .back-button {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: #f0f0f0;
            color: #333;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease, transform 0.3s ease;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        .back-button:hover {
            background-color: #e0e0e0;
            transform: scale(1.05);
        }

        .back-button:active {
            transform: scale(0.95);
        }

        .logo-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4CAF50;
            margin-top: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .bot-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .bot-title {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .click-text {
            color: #888;
            font-size: 14px;
            margin-top: 15px;
        }

        .action-button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, background-color 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }

        .action-button:hover {
            transform: scale(1.02);
            background-color: #45a049;
        }

        .action-button:active {
            transform: scale(0.98);
        }

        /* Hidden status - no visual impact */
        .hidden-status {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Back Button -->
        <a href="javascript:history.back()" class="back-button" title="Go back">←</a>

        <!-- Logo - loaded directly from Supabase public URL -->
        <img src="https://xoerkbmtucvzoilxdupf.supabase.co/storage/v1/object/public/media/logo.jpeg"

            OPEN WILLFORTUNATE POSTERWALL →

        <div class="click-text">Click to WILLFORTUNATE POSTER WALL</div>
